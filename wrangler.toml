name = "r-chat"
main = "src/index.ts"
compatibility_date = "2024-09-12"

[[d1_databases]]
binding = "DB"
database_name = "r-chat"
database_id = "r-chat-db"

[[kv_namespaces]]
binding = "SESSIONS"
id = "r-chat-sessions"

[env.production]
name = "r-chat-prod"
[[env.production.d1_databases]]
binding = "DB"
database_name = "r-chat-prod"
database_id = "r-chat-prod-db"

[triggers]
crons = ["0 */6 * * *"]

[build]
command = "npm run build"
cwd = "./frontend"
